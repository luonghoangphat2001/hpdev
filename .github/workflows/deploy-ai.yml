name: Deploy AI Bot

on:
  push:
    branches:
      - ai

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}

          script: |
            cd ~/ai.hpdev.name.vn
            git pull origin ai
            source ~/nodevenv/ai.hpdev.name.vn/19/bin/activate
            npm install
            # Restart Phusion Passenger for the web dashboard (app.js)
            mkdir -p tmp && touch tmp/restart.txt
            # Restart pm2 for Discord/Telegram bots (bot.js) — separate from dashboard
            which pm2 || npm install -g pm2
            pm2 delete bot 2>/dev/null || true
            pm2 start bot.js --name bot