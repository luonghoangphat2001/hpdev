<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bot — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <!-- Header -->
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🤖</span>
      <h1 class="text-xl font-bold">AI Bot Dashboard</h1>
    </div>
    <form method="POST" action="/logout">
      <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition">Logout</button>
    </form>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8 space-y-8">

    <!-- Stats -->
    <section>
      <h2 class="text-lg font-semibold mb-4 text-gray-300">📊 Statistics</h2>
      <div class="grid grid-cols-3 gap-4" id="stats">
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-3xl font-bold text-indigo-400" id="stat-total">—</div>
          <div class="text-sm text-gray-400 mt-1">Total Messages</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-3xl font-bold text-green-400" id="stat-today">—</div>
          <div class="text-sm text-gray-400 mt-1">Today</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-3xl font-bold text-yellow-400" id="stat-model">—</div>
          <div class="text-sm text-gray-400 mt-1">Active Model</div>
        </div>
      </div>
    </section>

    <!-- Model + System Prompt -->
    <section class="bg-gray-800 rounded-xl p-6">
      <h2 class="text-lg font-semibold mb-5 text-gray-300">⚙️ Configuration</h2>

      <div class="mb-5">
        <label class="block text-sm text-gray-400 mb-2">AI Model</label>
        <div class="flex gap-3">
          <button onclick="setModel('gemini')" id="btn-gemini"
            class="flex-1 py-3 rounded-lg font-semibold border-2 transition text-sm">
            🌟 Gemini 2.5 Flash
          </button>
          <button onclick="setModel('claude')" id="btn-claude"
            class="flex-1 py-3 rounded-lg font-semibold border-2 transition text-sm">
            ✳️ Claude Sonnet
          </button>
        </div>
      </div>

      <div class="mb-5" id="claude-base-url-wrap">
        <label class="block text-sm text-gray-400 mb-2">Claude Base URL <span class="text-gray-500 font-normal">(proxy endpoint)</span></label>
        <input type="url" id="claude-base-url" placeholder="https://proxy-api.example.com/"
          class="w-full px-4 py-3 bg-gray-700 rounded-lg border border-gray-600 focus:border-indigo-500 focus:outline-none text-sm" />
      </div>

      <div class="mb-5">
        <label class="block text-sm text-gray-400 mb-2">System Prompt</label>
        <textarea id="system-prompt" rows="4"
          class="w-full px-4 py-3 bg-gray-700 rounded-lg border border-gray-600 focus:border-indigo-500 focus:outline-none resize-none text-sm"></textarea>
      </div>

      <button onclick="saveConfig()"
        class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-semibold text-sm transition">
        Save Changes
      </button>
      <span id="save-msg" class="ml-3 text-sm text-green-400 hidden">✓ Saved!</span>
    </section>

    <!-- Conversation History -->
    <section class="bg-gray-800 rounded-xl p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold text-gray-300">💬 Conversation History</h2>
        <button onclick="loadHistory()" class="text-sm text-indigo-400 hover:text-indigo-300">Refresh</button>
      </div>
      <div id="history" class="space-y-2 max-h-96 overflow-y-auto text-sm"></div>
    </section>

    <!-- Change Password -->
    <section class="bg-gray-800 rounded-xl p-6">
      <h2 class="text-lg font-semibold mb-5 text-gray-300">🔑 Change Password</h2>
      <div class="flex gap-3">
        <input type="password" id="new-password" placeholder="New password (min 6 chars)"
          class="flex-1 px-4 py-2 bg-gray-700 rounded-lg border border-gray-600 focus:border-indigo-500 focus:outline-none text-sm" />
        <button onclick="changePassword()"
          class="px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-semibold transition">
          Update
        </button>
      </div>
      <p id="pw-msg" class="mt-2 text-sm hidden"></p>
    </section>

  </main>

  <script>
    let activeModel = "gemini";

    async function loadConfig() {
      const res = await fetch("/api/config");
      const data = await res.json();
      activeModel = data.active_model;
      document.getElementById("system-prompt").value = data.system_prompt || "";
      document.getElementById("claude-base-url").value = data.claude_base_url || "";
      toggleBaseUrl(activeModel);
      updateModelButtons();
    }

    function toggleBaseUrl(model) {
      const wrap = document.getElementById("claude-base-url-wrap");
      wrap.style.display = model === "claude" ? "block" : "none";
    }

    async function loadStats() {
      const res = await fetch("/api/stats");
      const data = await res.json();
      document.getElementById("stat-total").textContent = data.total;
      document.getElementById("stat-today").textContent = data.today;
      document.getElementById("stat-model").textContent = activeModel === "claude" ? "Claude" : "Gemini";
    }

    async function loadHistory() {
      const res = await fetch("/api/history?limit=50");
      const data = await res.json();
      const container = document.getElementById("history");
      if (!data.length) {
        container.innerHTML = '<p class="text-gray-500 text-center py-4">No messages yet.</p>';
        return;
      }
      container.innerHTML = data.map((m) => `
        <div class="flex gap-3 p-3 rounded-lg ${m.role === "user" ? "bg-gray-700" : "bg-gray-750"}">
          <span class="shrink-0 font-semibold ${m.role === "user" ? "text-blue-400" : "text-green-400"}">
            ${m.role === "user" ? "👤 " + m.username : "🤖 Bot"}
          </span>
          <span class="text-gray-300 break-words min-w-0">${escapeHtml(m.content)}</span>
          <span class="ml-auto shrink-0 text-gray-500 text-xs">${new Date(m.created_at).toLocaleString()}</span>
        </div>
      `).join("");
    }

    function updateModelButtons() {
      const btnGemini = document.getElementById("btn-gemini");
      const btnClaude = document.getElementById("btn-claude");
      if (activeModel === "claude") {
        btnClaude.className = "flex-1 py-3 rounded-lg font-semibold border-2 transition text-sm border-indigo-500 bg-indigo-900 text-white";
        btnGemini.className = "flex-1 py-3 rounded-lg font-semibold border-2 transition text-sm border-gray-600 text-gray-400";
      } else {
        btnGemini.className = "flex-1 py-3 rounded-lg font-semibold border-2 transition text-sm border-indigo-500 bg-indigo-900 text-white";
        btnClaude.className = "flex-1 py-3 rounded-lg font-semibold border-2 transition text-sm border-gray-600 text-gray-400";
      }
      document.getElementById("stat-model").textContent = activeModel === "claude" ? "Claude" : "Gemini";
    }

    async function setModel(model) {
      activeModel = model;
      toggleBaseUrl(model);
      updateModelButtons();
      await fetch("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ active_model: model }),
      });
    }

    async function saveConfig() {
      const system_prompt = document.getElementById("system-prompt").value;
      const claude_base_url = document.getElementById("claude-base-url").value;
      await fetch("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ active_model: activeModel, system_prompt, claude_base_url }),
      });
      const msg = document.getElementById("save-msg");
      msg.classList.remove("hidden");
      setTimeout(() => msg.classList.add("hidden"), 2000);
    }

    async function changePassword() {
      const password = document.getElementById("new-password").value;
      const msgEl = document.getElementById("pw-msg");
      const res = await fetch("/api/password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      msgEl.classList.remove("hidden", "text-red-400", "text-green-400");
      if (data.ok) {
        msgEl.textContent = "✓ Password updated!";
        msgEl.classList.add("text-green-400");
        document.getElementById("new-password").value = "";
      } else {
        msgEl.textContent = "✗ " + (data.error || "Failed");
        msgEl.classList.add("text-red-400");
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Init
    loadConfig().then(() => loadStats());
    loadHistory();
  </script>
</body>
</html>
