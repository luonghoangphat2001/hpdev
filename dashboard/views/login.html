<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bot — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🤖</div>
      <h1 class="text-2xl font-bold text-white">AI Bot Dashboard</h1>
      <p class="text-gray-400 text-sm mt-1">Đăng nhập để tiếp tục</p>
    </div>

    <form method="POST" action="/login" class="space-y-4">
      <input
        type="text"
        name="username"
        placeholder="Username"
        autofocus
        autocomplete="username"
        class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 border border-gray-600 focus:border-indigo-500 focus:outline-none"
      />
      <input
        type="password"
        name="password"
        placeholder="Password"
        autocomplete="current-password"
        class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 border border-gray-600 focus:border-indigo-500 focus:outline-none"
      />
      <button
        type="submit"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition"
      >
        Login
      </button>
    </form>

    <script>
      if (new URLSearchParams(location.search).get("error")) {
        const el = document.createElement("p");
        el.className = "text-red-400 text-sm text-center mt-4";
        el.textContent = "Sai username hoặc password. Thử lại.";
        document.querySelector("form").after(el);
      }
    </script>
  </div>
</body>
</html>
